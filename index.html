<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PP Fees Calculator</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
      font-size: 20px;
    }
    input, button {
      font-size: 18px;
      padding: 10px;
      margin: 10px;
    }
  </style>
</head>
<body>

<h2>PayPal Fee Calculator</h2>

<input type="number" id="amount" placeholder="Enter amount">
<br>

<button onclick="calcFee()">Calculate</button>

<p id="result"></p>

<script>
function calcFee() {
  var amt = parseFloat(document.getElementById('amount').value);
  if (isNaN(amt)) {
    document.getElementById('result').innerHTML = "Enter a valid amount";
    return;
  }
  var fee = (amt * 0.029 + 0.30).toFixed(2);
  var final = (amt - fee).toFixed(2);
  document.getElementById('result').innerHTML =
    "Fee: $" + fee + "<br>Final Amount: $" + final;
}
</script>

</body>
</html>
